<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body { margin: 0; background: #fff; font-family: monospace; }
        .wrap { padding: clamp(24px, 8vw, 48px) clamp(20px, 6vw, 32px); }
        h1 { font-size: clamp(1rem, 4vw, 1.1rem); font-weight: normal; color: #333; }
        p  { font-size: clamp(0.85rem, 3.5vw, 0.9rem); color: #999; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>404 Not Found</h1>
        <p>The requested URL was not found on this server.</p>
    </div>
</body>
</html>
