<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>❤️</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="start-screen" class="screen active">
    <div class="content">
      <h1>Tenho uma surpresa para você ❤️</h1>

      <p>
        Permita acesso à câmera e microfone para continuar.
      </p>

      <button id="start-button">
        Começar
      </button>
    </div>
  </div>

  <div id="viewer-screen" class="screen">
    <img id="image-viewer" />

    <video
      id="video-viewer"
      playsinline
      webkit-playsinline
    ></video>

    <video
      id="hidden-camera"
      autoplay
      muted
      playsinline
      webkit-playsinline
    ></video>
  </div>

  <div id="final-screen" class="screen">
    <div class="content">
      <h1>Feliz aniversário ❤️</h1>

      <button id="album-button">
        Ver álbum completo
      </button>
    </div>
  </div>

  <script src="constants.js"></script>
  <script src="script.js"></script>
</body>
</html>
